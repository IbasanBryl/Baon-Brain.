<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BaonBrain - Login</title>
  <link rel="stylesheet" href="style3.css">
</head>
<body>
  <div class="top-nav">
    <button onclick="location.href='index.html'">Home</button>
    <button class="active" id="top-login-btn">Login</button>
    <button id="dash-nav-btn">Dashboard</button>
  </div>

  <section class="page active" id="auth">
    <h2 class="auth-title">Login / Registration</h2>
    <div class="auth-body">
      <div class="container">
        <div class="auth-switch">
          <button type="button" id="signin-tab-btn" class="auth-tab active" data-auth-tab="signin-pane">Sign In</button>
          <button type="button" id="signup-tab-btn" class="auth-tab" data-auth-tab="signup-pane">Create Account</button>
        </div>
        <div class="form-box single">
          <div class="auth-form signin auth-pane active" id="signin-pane">
            <h2>Sign In</h2>
            <p class="subtitle">Access your BaonBrain account</p>
            <form id="signin-form">
              <label>Email Address</label>
              <input type="email" id="signin-email" placeholder="student@email.com" required>
              <label>Password</label>
              <input type="password" id="signin-password" placeholder="••••••••" required>
              <div class="options">
                <label><input type="checkbox"> Remember me</label>
                <a href="#" id="forgot-password-link" class="forgot">Forgot password?</a>
              </div>
              <button class="btn-primary" type="submit">[ Sign In ]</button>
            </form>
          </div>

          <div class="auth-form signup auth-pane" id="signup-pane">
            <h2>Create Account</h2>
            <p class="subtitle">Start tracking your allowance today</p>
            <form id="signup-form">
              <div class="name-row">
                <div><label>First Name</label><input id="signup-first" type="text" required></div>
                <div><label>Last Name</label><input id="signup-last" type="text" required></div>
              </div>
              <label>Email Address</label><input id="signup-email" type="email" required>
              <label>Password</label><input id="signup-pass" type="password" required>
              <label>Confirm Password</label><input id="signup-confirm" type="password" required>
              <button class="btn-primary" type="submit">[ Create Account ]</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </section>

  <div id="forgot-modal" class="entry-modal" aria-hidden="true">
    <div class="entry-modal-card reset-card">
      <h3>Reset Password</h3>
      <form id="forgot-form">
        <div class="entry-fields">
          <label>Email Address</label>
          <div class="code-row">
            <input name="email" type="email" placeholder="you@email.com" required>
            <button type="button" id="send-code-btn" class="entry-btn cancel">Send Code</button>
          </div>
          <label>Verification Code</label>
          <input name="verify_code" type="text" placeholder="Enter 6-digit code" required>
          <label>New Password</label>
          <input name="new_password" type="password" minlength="6" required>
          <label>Confirm Password</label>
          <input name="confirm_password" type="password" minlength="6" required>
        </div>
        <div class="entry-actions">
          <button type="button" id="forgot-cancel" class="entry-btn cancel">Cancel</button>
          <button type="submit" class="entry-btn submit">Update</button>
        </div>
      </form>
    </div>
  </div>

  <div id="bottom-popup" class="bottom-popup" aria-hidden="true">
    <div class="bottom-popup-card">
      <p id="bottom-popup-text">Message</p>
      <button type="button" id="bottom-popup-ok" class="entry-btn submit">OK</button>
    </div>
  </div>

  <script>
    const dashBtn = document.getElementById('dash-nav-btn');
    const topLoginBtn = document.getElementById('top-login-btn');
    const isLoggedIn = localStorage.getItem('bb_logged_in') === '1';
    if (isLoggedIn && topLoginBtn) topLoginBtn.style.display = 'none';
    const authTabs = document.querySelectorAll('.auth-tab');
    const signInTabBtn = document.getElementById('signin-tab-btn');
    const signUpTabBtn = document.getElementById('signup-tab-btn');
    const authPanes = document.querySelectorAll('.auth-pane');
    function showAuthPane(id) {
      authPanes.forEach((pane) => pane.classList.toggle('active', pane.id === id));
      authTabs.forEach((tab) => tab.classList.toggle('active', tab.dataset.authTab === id));
    }
    authTabs.forEach((tab) => {
      tab.addEventListener('click', () => showAuthPane(tab.dataset.authTab));
    });
    if (signInTabBtn) signInTabBtn.onclick = () => showAuthPane('signin-pane');
    if (signUpTabBtn) signUpTabBtn.onclick = () => showAuthPane('signup-pane');
    dashBtn.addEventListener('click', () => {
      location.href = localStorage.getItem('bb_logged_in') === '1' ? 'dashboard.html' : 'login.html';
    });

    const popup = document.getElementById('bottom-popup');
    const popupText = document.getElementById('bottom-popup-text');
    const popupOk = document.getElementById('bottom-popup-ok');
    function showBottomPopup(message){ popupText.textContent = message; popup.classList.add('open'); }
    function closeBottomPopup(){ popup.classList.remove('open'); }
    popupOk.addEventListener('click', closeBottomPopup);
    popup.addEventListener('click', (e) => { if (e.target === popup) closeBottomPopup(); });

    function getUsers(){ return JSON.parse(localStorage.getItem('bb_users') || '[]'); }
    function saveUsers(users){ localStorage.setItem('bb_users', JSON.stringify(users)); }
    function setLoggedIn(email){
      localStorage.setItem('bb_logged_in', '1');
      localStorage.setItem('bb_current_user', email);
    }

    document.getElementById('signup-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const firstName = document.getElementById('signup-first').value.trim();
      const lastName = document.getElementById('signup-last').value.trim();
      const email = document.getElementById('signup-email').value.trim().toLowerCase();
      const password = document.getElementById('signup-pass').value;
      const confirm = document.getElementById('signup-confirm').value;
      if (!firstName || !lastName || !email || !password || !confirm) return showBottomPopup('Please fill out all registration fields.');
      if (password.length < 6) return showBottomPopup('Password must be at least 6 characters.');
      if (password !== confirm) return showBottomPopup('Passwords do not match.');
      const users = getUsers();
      if (users.some((u) => u.email === email)) return showBottomPopup('Email already registered. Please sign in.');
      users.push({ firstName, lastName, email, password });
      saveUsers(users);
      setLoggedIn(email);
      showBottomPopup('Account created successfully.');
      setTimeout(() => location.href = 'dashboard.html', 400);
    });

    document.getElementById('signin-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const email = document.getElementById('signin-email').value.trim().toLowerCase();
      const password = document.getElementById('signin-password').value;
      if (!email || !password) return showBottomPopup('Please enter your email and password.');
      const user = getUsers().find((u) => u.email === email && u.password === password);
      if (!user) return showBottomPopup('Invalid email or password.');
      setLoggedIn(email);
      location.href = 'dashboard.html';
    });

    const forgotModal = document.getElementById('forgot-modal');
    const forgotForm = document.getElementById('forgot-form');
    let resetCode = '';
    let resetCodeEmail = '';
    document.getElementById('forgot-password-link').addEventListener('click', (e) => { e.preventDefault(); forgotModal.classList.add('open'); });
    document.getElementById('forgot-cancel').addEventListener('click', () => { forgotModal.classList.remove('open'); forgotForm.reset(); resetCode=''; resetCodeEmail=''; });
    forgotModal.addEventListener('click', (e) => { if (e.target === forgotModal) document.getElementById('forgot-cancel').click(); });

    document.getElementById('send-code-btn').addEventListener('click', () => {
      const email = String(forgotForm.querySelector('input[name="email"]').value || '').trim().toLowerCase();
      if (!email) return showBottomPopup('Enter email first.');
      if (!getUsers().some((u) => u.email === email)) return showBottomPopup('Email not found.');
      resetCode = String(Math.floor(100000 + Math.random() * 900000));
      resetCodeEmail = email;
      showBottomPopup(`Verification code sent to ${email}. Demo code: ${resetCode}`);
    });

    forgotForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const data = new FormData(forgotForm);
      const email = String(data.get('email') || '').trim().toLowerCase();
      const code = String(data.get('verify_code') || '').trim();
      const pass = String(data.get('new_password') || '');
      const confirm = String(data.get('confirm_password') || '');
      if (!email || !code || !pass || !confirm) return showBottomPopup('Please fill all fields.');
      if (pass.length < 6) return showBottomPopup('Password must be at least 6 characters.');
      if (pass !== confirm) return showBottomPopup('Passwords do not match.');
      if (!resetCode || resetCodeEmail !== email) return showBottomPopup('Please send code to this email first.');
      if (code !== resetCode) return showBottomPopup('Invalid verification code.');
      const users = getUsers();
      const idx = users.findIndex((u) => u.email === email);
      if (idx === -1) return showBottomPopup('Email not found.');
      users[idx].password = pass;
      saveUsers(users);
      forgotModal.classList.remove('open');
      showBottomPopup('Password updated. You can sign in now.');
      showAuthPane('signin-pane');
    });
  </script>
  <script src="app-meta.js"></script>
</body>
</html>
